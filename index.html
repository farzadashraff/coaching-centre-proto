<!DOCTYPE html>
<html>
<head>
  <title>Lead Capture</title>
</head>
<body>

<h2>Student Inquiry Form</h2>

<form id="leadForm">
  <input type="text" id="name" placeholder="Name" required /><br><br>
  <input type="text" id="phone" placeholder="Phone" required /><br><br>

  <select id="stage" required>
    <option value="">Select Academic Stage</option>
    <option value="School (Class 9-10)">School (Class 9-10)</option>
    <option value="School (Class 11-12)">School (Class 11-12)</option>
    <option value="Dropper">Dropper</option>
    <option value="Undergraduate">Undergraduate</option>
    <option value="Postgraduate">Postgraduate</option>
    <option value="Working Professional">Working Professional</option>
  </select><br><br>

  <select id="category" required>
    <option value="">Select Category</option>
    <option value="Engineering">Engineering & Technology</option>
    <option value="Medical">Medical</option>
    <option value="Abroad">Abroad / International</option>
    <option value="Government">Government & Civil Services</option>
    <option value="Professional">Professional Certifications</option>
    <option value="Design">Design & Architecture</option>
  </select><br><br>

  <select id="exam" required>
    <option value="">Select Exam</option>
  </select><br><br>

  <button type="submit">Submit</button>
</form>

<br>

<button id="whatsappBtn" style="display:none;">
  Message us on WhatsApp
</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);

const BUSINESS_ID = "b1947d29-7a01-4d50-a3e4-66fd1503d67d";

const examOptions = {
  Engineering: ["JEE","GATE","BITSAT","VITEEE"],
  Medical: ["NEET UG","NEET PG","FMGE"],
  Abroad: ["IELTS","TOEFL","PTE"],
  Government: ["UPSC","SSC"],
  Professional: ["CFA","ACCA","AWS"],
  Design: ["NATA","UCEED"]
};

document.getElementById("category").addEventListener("change", function () {
  const examDropdown = document.getElementById("exam");
  examDropdown.innerHTML = '<option value="">Select Exam</option>';

  (examOptions[this.value] || []).forEach(exam => {
    const option = document.createElement("option");
    option.value = exam;
    option.textContent = exam;
    examDropdown.appendChild(option);
  });
});

document.getElementById("leadForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  const stage = document.getElementById("stage").value;
  const category = document.getElementById("category").value;
  const exam = document.getElementById("exam").value;

  // ✅ FIXED NORMALIZATION
  phone = phone.replace(/\D/g, "");
  if (phone.length === 10) {
    phone = "91" + phone;
  }

  const payload = {
    name,
    phone,
    stage,
    category,
    exam,
    business_id: BUSINESS_ID
  };

  console.log("SENDING:", payload);

  const { data, error } = await supabaseClient
    .from("Leads")
    .insert([payload])
    .select();

  console.log("RESPONSE:", { data, error });

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  alert("Form submitted successfully");

  const message = `Hi, I am ${name}, currently ${stage}. I am interested in ${exam} under ${category}.`;
  const encodedMessage = encodeURIComponent(message);

  const whatsappURL = `https://api.whatsapp.com/send?phone=14155238886&text=${encodedMessage}`;

  const btn = document.getElementById("whatsappBtn");
  btn.style.display = "block";

  btn.onclick = () => {
    window.open(whatsappURL, "_blank");
  };
});
</script>

</body>
</html>
