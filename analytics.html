    </nav>

  <main class="main">

    <div class="topbar">

      <div>

        <h1 class="page-title">
          Analytics
        </h1>

        <p class="page-subtitle">
          Track performance and business growth.
        </p>

      </div>

    </div>

    <section class="analytics-grid">

      <div class="analytics-card">

        <div class="analytics-title">
          Total Leads
        </div>

        <div class="analytics-value" id="totalLeads">
          0
        </div>

      </div>

      <div class="analytics-card">

        <div class="analytics-title">
          Converted Students
        </div>

        <div class="analytics-value" id="convertedStudents">
          0
        </div>

      </div>

      <div class="analytics-card">

        <div class="analytics-title">
          Conversion Rate
        </div>

        <div class="analytics-value" id="conversionRate">
          0%
        </div>

      </div>

      <div class="analytics-card">

        <div class="analytics-title">
          Pending Followups
        </div>

        <div class="analytics-value" id="pendingFollowups">
          0
        </div>

      </div>

    </section>

    <section class="chart-section">

      <div class="chart-card">

        <h3>
          Leads by Course
        </h3>

        <div id="courseStats">

        </div>

      </div>

    </section>
