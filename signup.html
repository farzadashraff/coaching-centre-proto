<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #111111;
      --bg-soft: rgba(255, 255, 255, 0.04);
      --bg-strong: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.12);
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #f5f2ec;
      --muted: #8d8a84;
      --gold: #d9bc84;
      --blue: #9cbcff;
      --teal: #7ad9c7;
      --rose: #f1a8b5;
      --violet: #b59cff;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.4);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      color: var(--text);
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 255, 255, 0.035), transparent 18%),
        radial-gradient(circle at 82% 16%, rgba(217, 188, 132, 0.09), transparent 18%),
        linear-gradient(180deg, #171717 0%, #121212 48%, #0d0d0d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 22%, transparent 76%);
      opacity: 0.28;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .scene::before {
      background:
        radial-gradient(circle at 18% 34%, rgba(122, 217, 199, 0.08), transparent 18%),
        radial-gradient(circle at 80% 68%, rgba(156, 188, 255, 0.08), transparent 16%),
        radial-gradient(circle at 64% 24%, rgba(217, 188, 132, 0.08), transparent 16%);
      filter: blur(10px);
      animation: sceneGlow 12s ease-in-out infinite alternate;
    }

    .scene::after {
      background:
        linear-gradient(90deg, transparent 12%, rgba(255, 255, 255, 0.03) 12.3%, transparent 12.6%, transparent 54%, rgba(255, 255, 255, 0.03) 54.2%, transparent 54.5%),
        linear-gradient(transparent 22%, rgba(255, 255, 255, 0.03) 22.2%, transparent 22.5%, transparent 74%, rgba(255, 255, 255, 0.03) 74.2%, transparent 74.5%);
      opacity: 0.45;
    }

    .node,
    .pulse,
    .rail {
      position: absolute;
      border-radius: 999px;
    }

    .rail {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      opacity: 0.55;
    }

    .rail.r1 {
      width: 38vw;
      top: 22%;
      left: 8%;
      transform: rotate(14deg);
      animation: driftLine 10s ease-in-out infinite;
    }

    .rail.r2 {
      width: 30vw;
      top: 58%;
      right: 10%;
      transform: rotate(-18deg);
      animation: driftLine 13s ease-in-out infinite reverse;
    }

    .rail.r3 {
      width: 24vw;
      bottom: 20%;
      left: 28%;
      transform: rotate(8deg);
      animation: driftLine 11s ease-in-out infinite;
    }

    .node {
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.02);
      animation: pulseNode 4s ease-in-out infinite;
    }

    .node.n1 {
      top: 21%;
      left: 19%;
      background: var(--gold);
    }

    .node.n2 {
      top: 33%;
      right: 22%;
      background: var(--blue);
      animation-delay: 0.8s;
    }

    .node.n3 {
      bottom: 26%;
      left: 31%;
      background: var(--teal);
      animation-delay: 1.4s;
    }

    .node.n4 {
      bottom: 18%;
      right: 28%;
      background: var(--rose);
      animation-delay: 0.4s;
    }

    .pulse {
      width: 140px;
      height: 140px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      opacity: 0.32;
      animation: echo 5.5s ease-out infinite;
    }

    .pulse.p1 {
      top: 14%;
      right: 12%;
      border-color: rgba(156, 188, 255, 0.16);
    }

    .pulse.p2 {
      bottom: 10%;
      left: 10%;
      border-color: rgba(217, 188, 132, 0.16);
      animation-delay: 1.6s;
    }

    .pulse.p3 {
      top: 44%;
      left: 8%;
      border-color: rgba(122, 217, 199, 0.16);
      animation-delay: 0.8s;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .auth-stage {
      width: min(100%, 640px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wordmark {
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: clamp(4rem, 12vw, 7.8rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 0.92;
      text-wrap: balance;
      text-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      animation: riseIn 1s var(--ease);
    }

    .wordmark span {
      display: inline-block;
    }

    .c1 { color: #f4efe6; }
    .c2 { color: var(--gold); }
    .c3 { color: var(--blue); }
    .c4 { color: var(--teal); }
    .c5 { color: var(--rose); }
    .c6 { color: var(--violet); }
    .c7 { color: #f4efe6; }
    .c8 { color: var(--gold); }
    .c9 { color: var(--blue); }

    .subhead {
      margin-top: 18px;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      animation: breathe 3s var(--ease) infinite;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
      letter-spacing: 0.01em;
    }

    .auth-form {
      width: 100%;
      max-width: 440px;
      margin-top: 34px;
      display: grid;
      gap: 14px;
    }

    .field-shell {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 16px 18px 14px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line-soft);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 12px 34px rgba(0, 0, 0, 0.22);
      transition: transform 220ms var(--ease), border-color 220ms var(--ease), box-shadow 220ms var(--ease), background 220ms var(--ease);
      text-align: left;
    }

    .field-shell::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(217, 188, 132, 0.55), transparent);
      opacity: 0.55;
    }

    .field-shell:hover,
    .field-shell:focus-within {
      transform: translateY(-2px);
      border-color: rgba(217, 188, 132, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 18px 42px rgba(0, 0, 0, 0.26), 0 0 0 4px rgba(217, 188, 132, 0.05);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025));
    }

    .field-shell label {
      color: rgba(245, 242, 236, 0.8);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 1rem;
    }

    input::placeholder {
      color: rgba(141, 138, 132, 0.9);
    }

    .actions {
      margin-top: 8px;
      display: grid;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 20px;
      min-height: 54px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease), filter 220ms var(--ease), background 220ms var(--ease), border-color 220ms var(--ease);
    }

    button:hover {
      transform: translateY(-2px);
    }

    #signupBtn {
      background: linear-gradient(135deg, #f0d9a7, #d9bc84);
      color: #101010;
      box-shadow: 0 18px 34px rgba(217, 188, 132, 0.18);
    }

    #msg {
      min-height: 22px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.035);
        opacity: 0.92;
      }
    }

    @keyframes sceneGlow {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(0, -10px, 0) scale(1.04);
      }
    }

    @keyframes pulseNode {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.02);
      }
      50% {
        transform: scale(1.18);
        box-shadow: 0 0 0 16px rgba(255, 255, 255, 0.01);
      }
    }

    @keyframes echo {
      0% {
        transform: scale(0.6);
        opacity: 0;
      }
      30% {
        opacity: 0.32;
      }
      100% {
        transform: scale(1.55);
        opacity: 0;
      }
    }

    @keyframes driftLine {
      0%, 100% {
        transform: translateY(0) rotate(14deg);
      }
      50% {
        transform: translateY(-8px) rotate(16deg);
      }
    }

    .rail.r2 {
      animation-name: driftLineTwo;
    }

    .rail.r3 {
      animation-name: driftLineThree;
    }

    @keyframes driftLineTwo {
      0%, 100% {
        transform: translateY(0) rotate(-18deg);
      }
      50% {
        transform: translateY(8px) rotate(-16deg);
      }
    }

    @keyframes driftLineThree {
      0%, 100% {
        transform: translateY(0) rotate(8deg);
      }
      50% {
        transform: translateY(-6px) rotate(10deg);
      }
    }

    @media (max-width: 680px) {
      .auth-form {
        max-width: 100%;
      }

      .wordmark {
        font-size: clamp(3.1rem, 16vw, 5rem);
      }

      .subhead {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="scene" aria-hidden="true">
  <div class="rail r1"></div>
  <div class="rail r2"></div>
  <div class="rail r3"></div>
  <div class="node n1"></div>
  <div class="node n2"></div>
  <div class="node n3"></div>
  <div class="node n4"></div>
  <div class="pulse p1"></div>
  <div class="pulse p2"></div>
  <div class="pulse p3"></div>
</div>

<main class="page-shell">
  <section class="auth-stage">
    <h1 class="wordmark" aria-label="Fazz Stack">
      <span class="c1">F</span><span class="c2">a</span><span class="c3">z</span><span class="c4">z</span><span class="c5">S</span><span class="c6">t</span><span class="c7">a</span><span class="c8">c</span><span class="c9">k</span>
    </h1>

    <div class="subhead">Create your account</div>
    <p class="subtitle">Set up your institute access</p>

    <div class="auth-form">
      <div class="field-shell">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="Email"><br><br>
      </div>

      <div class="field-shell">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password"><br><br>
      </div>

      <div class="actions">
        <button id="signupBtn">Create account</button>
        <p id="msg"></p>
      </div>
    </div>
  </section>
</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);

// ✅ ONLY REDIRECT IF SESSION EXISTS ON SIGNUP PAGE
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    window.location.href = "/admin.html";
  }
})();

document.getElementById("signupBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "Creating account...";

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    msg.innerText = "Error: " + error.message;
    return;
  }

  const user = data.user;

if (!user) {
  msg.innerText = "Signup successful. Please verify email before login.";
  return;
}

  // ✅ CREATE BUSINESS
  const { error: bizError } = await supabaseClient
    .from("Businesses")
    .insert([{
      name: "My Coaching Business",
      user_id: user.id
    }]);

  if (bizError) {
    console.error(bizError);
    msg.innerText = "Signup done, but business creation failed";
    return;
  }

  // ✅ DIRECT REDIRECT (NO DELAY)
  window.location.href = "/admin.html";
};
</script>

</body>
</html>
