<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
</head>
<body>

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button id="signupBtn">Sign Up</button>

<p id="msg"></p>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);

// ✅ AUTO REDIRECT IF ALREADY LOGGED IN
(async () => {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (user) {
    window.location.href = "/admin.html";
  }
})();

document.getElementById("signupBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "Creating account...";

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    msg.innerText = "Error: " + error.message;
    return;
  }

  // ✅ GET USER AFTER SIGNUP
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    msg.innerText = "Signup successful. Please login.";
    return;
  }

  // ✅ CREATE BUSINESS
  const { error: bizError } = await supabaseClient
    .from("Businesses")
    .insert([{
      name: "My Coaching Business",
      user_id: user.id
    }]);

  if (bizError) {
    console.error(bizError);
    msg.innerText = "Signup done, but business creation failed";
    return;
  }

  // ✅ DIRECT REDIRECT (NO DELAY)
  window.location.href = "/admin.html";
};
</script>

</body>
</html>
