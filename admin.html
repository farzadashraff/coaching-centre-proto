<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Status</th>
      <th>Duration</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://xsdalnxweznnjzogyqaa.supabase.co";
const SUPABASE_KEY = "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function fetchData() {
  try {
    // ✅ check login
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
      alert("Not logged in");
      window.location.href = "/login.html";
      return;
    }

    console.log("USER:", user);

    // ✅ get business
    const { data: businesses, error: bizError } = await supabaseClient
      .from("Businesses")
      .select("*")
      .eq("user_id", user.id);

    console.log("BUSINESSES:", businesses, bizError);

    if (bizError || !businesses || businesses.length === 0) {
      alert("No business linked");
      return;
    }

    const BUSINESS_ID = businesses[0].id;

    // ✅ get leads
    const { data: leads, error: leadsError } = await supabaseClient
      .from("Leads")
      .select("*")
      .eq("business_id", BUSINESS_ID)
      .order("created_at", { ascending: false });

    console.log("LEADS:", leads, leadsError);

    // ✅ get interactions
    const { data: interactions, error: interError } = await supabaseClient
      .from("interactions")
      .select("*")
      .eq("business_id", BUSINESS_ID);

    console.log("INTERACTIONS:", interactions, interError);

    if (leadsError || interError) {
      console.error("Fetch error:", leadsError, interError);
      return;
    }

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    // ✅ FIX: phone cleaner function
    const clean = p => (p || "").replace(/\D/g, "");

    leads.forEach(lead => {

      // ✅ FIX: find matching interaction
      const interaction = interactions
        .filter(i => clean(i.phone) === clean(lead.phone))
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${lead.name || ""}</td>
        <td>${lead.phone || ""}</td>
        <td>${lead.stage || ""}</td>
        <td>${lead.category || ""}</td>
        <td>${lead.exam || ""}</td>

        <td>
          <select onchange="updateStatus('${lead.ID}', this.value)">
            <option ${lead.status === 'New' ? 'selected' : ''}>New</option>
            <option ${lead.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
            <option ${lead.status === 'Interested' ? 'selected' : ''}>Interested</option>
            <option ${lead.status === 'Converted' ? 'selected' : ''}>Converted</option>
            <option ${lead.status === 'Dropped' ? 'selected' : ''}>Dropped</option>
          </select>
        </td>

        <td>${interaction ? interaction.selection : "Not Selected"}</td>
      `;

      table.appendChild(row);
    });

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// ✅ NEW FUNCTION ADDED
async function updateStatus(leadId, newStatus) {
  const { error } = await supabaseClient
    .from("Leads")
    .update({ status: newStatus })
    .eq("ID", leadId);

  if (error) {
    alert("Failed to update status");
    console.error(error);
  } else {
    console.log("Status updated");
  }
}

fetchData();
</script>

</body>
</html>
