<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<table border="1" id="leadsTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Duration</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const SUPABASE_URL = "https://xsdalnxweznnjzogyqaa.supabase.co";
const SUPABASE_KEY = "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt";

async function fetchData() {
  try {
    const leadsRes = await fetch(
      `${SUPABASE_URL}/rest/v1/leads?order=created_at.desc`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const leads = await leadsRes.json();

    const interRes = await fetch(
      `${SUPABASE_URL}/rest/v1/interactions`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const interactions = await interRes.json();

    const table = document.querySelector("#leadsTable tbody");
    table.innerHTML = "";

    leads.forEach(lead => {

      const interaction = interactions
        .filter(i => i.phone === lead.phone)
        .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))[0];

      const row = `
        <tr>
          <td>${lead.name || ""}</td>
          <td>${lead.phone}</td>
          <td>${lead.stage || ""}</td>
          <td>${lead.category || ""}</td>
          <td>${lead.exam || ""}</td>
          <td>${interaction ? interaction.selection : "Not Selected"}</td>
        </tr>
      `;

      table.innerHTML += row;
    });

  } catch (err) {
    console.error("ERROR:", err);
  }
}

fetchData();
</script>

</body>
</html>
