<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Duration</th>
    </tr>
  </thead>
  <!-- ✅ FIXED: added id -->
  <tbody id="tableBody"></tbody>
</table>

<script>
const SUPABASE_URL = "https://xsdalnxweznnjzogyqaa.supabase.co";
const SUPABASE_KEY = "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt";

async function fetchData() {
  try {
    const leadsRes = await fetch(
      `${SUPABASE_URL}/rest/v1/Leads?order=created_at.desc`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const leads = await leadsRes.json();

    const interRes = await fetch(
      `${SUPABASE_URL}/rest/v1/interactions`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const interactions = await interRes.json();

    // safety check
    if (!Array.isArray(leads) || !Array.isArray(interactions)) {
      console.error("Invalid data:", leads, interactions);
      return;
    }

    // ✅ FIXED: correct selector
    const table = document.getElementById("tableBody");

    if (!table) {
      console.error("tableBody not found");
      return;
    }

    table.innerHTML = "";

    leads.forEach(lead => {

      const cleanLeadPhone = (lead.phone || "").replace("whatsapp:", "").trim();

      const interaction = interactions
        .filter(i => (i.phone || "").replace("whatsapp:", "").trim() === cleanLeadPhone)
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${lead.name || ""}</td>
        <td>${lead.phone || ""}</td>
        <td>${lead.stage || ""}</td>
        <td>${lead.category || ""}</td>
        <td>${lead.exam || ""}</td>
        <td>${interaction ? interaction.selection : "Not Selected"}</td>
      `;

      table.appendChild(row);
    });

  } catch (err) {
    console.error("ERROR:", err);
  }
}

fetchData();
</script>

</body>
</html>
