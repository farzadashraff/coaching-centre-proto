<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<div>
  <strong id="userInfo">Checking user...</strong>
  <button id="logoutBtn">Logout</button>
</div>

<br>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);

let BUSINESS_ID = null;

// ================= INIT =================
async function init() {
  const { data: { user }, error } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("userInfo").innerText =
    "Logged in as: " + user.email;

  // get business
  const { data: biz, error: bizError } = await supabaseClient
    .from("Businesses")
    .select("id")
    .eq("user_id", user.id)
    .single();

  if (bizError || !biz) {
    alert("No business found");
    console.error(bizError);
    return;
  }

  BUSINESS_ID = biz.id;

  loadLeads();
}

// ================= LOAD LEADS =================
async function loadLeads() {
  const { data: leads, error } = await supabaseClient
    .from("Leads")
    .select("*")
    .eq("business_id", BUSINESS_ID)
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  render(leads || []);
}

// ================= RENDER =================
function render(leads) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  leads.forEach(l => {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${l.name || ""}</td>
        <td>${l.phone || ""}</td>
        <td>${l.stage || ""}</td>
        <td>${l.category || ""}</td>
        <td>${l.exam || ""}</td>
        <td>
            <select onchange="updateStatus('${l.id}', this.value)">
                <option ${l.status === "New" ? "selected" : ""}>New</option>
                <option ${l.status === "Interested" ? "selected" : ""}>Interested</option>
                <option ${l.status === "Contacted" ? "selected" : ""}>Contacted</option>
                <option ${l.status === "Converted" ? "selected" : ""}>Converted</option>
                <option ${l.status === "Dropped" ? "selected" : ""}>Dropped</option>
            </select>
        </td>
    `;

    table.appendChild(row);
  });
}

// ================= LOGOUT =================
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
});

// ================= START =================
init();
</script>

</body>
</html>
