<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<div style="margin: 20px 0;">
  <strong>Your Student Form Link:</strong><br>
  <input id="formLink" style="width: 400px;" readonly />
  <button onclick="copyLink()">Copy</button>
</div>

<div>
  <strong id="userInfo">Checking user...</strong>
  <button id="logoutBtn">Logout</button>
</div>

<br>
<br>

<label>Filter by Status: </label>
<select id="statusFilter">
  <option value="All">All</option>
  <option value="New">New</option>
  <option value="Interested">Interested</option>
  <option value="Contacted">Contacted</option>
  <option value="Converted">Converted</option>
  <option value="Dropped">Dropped</option>
</select>

<br><br>
<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);
let ALL_LEADS = [];
let BUSINESS_ID = null;

// ================= INIT =================
async function init() {
  const { data: { user }, error } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("userInfo").innerText =
    "Logged in as: " + user.email;

  // get business
  const { data: biz, error: bizError } = await supabaseClient
    .from("Businesses")
    .select("id")
    .eq("user_id", user.id)
    .single();

  if (bizError || !biz) {
    alert("No business found");
    console.error(bizError);
    return;
  }

  BUSINESS_ID = biz.id;
  setFormLink();

  loadLeads();

}

// ================= LOAD LEADS =================
async function loadLeads() {
  const { data: leads, error } = await supabaseClient
    .from("Leads")
    .select("*")
    .eq("business_id", BUSINESS_ID)
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  // ✅ ADD THIS
  ALL_LEADS = leads || [];

  // ✅ REPLACE THIS LINE
  render(ALL_LEADS);
}

function setFormLink() {
  const link = `${window.location.origin}/form.html?biz=${BUSINESS_ID}`;
  document.getElementById("formLink").value = link;
}

function copyLink() {
  const input = document.getElementById("formLink");
  input.select();
  document.execCommand("copy");
  alert("Link copied!");
}

// ================= RENDER =================
function render(leads) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  leads.forEach(l => {
    const row = document.createElement("tr");
    // COLOR CODING
        if (l.status === "Converted") row.style.backgroundColor = "#d4edda"; // green
        if (l.status === "Dropped") row.style.backgroundColor = "#f8d7da"; // red
        if (l.status === "Interested") row.style.backgroundColor = "#fff3cd"; // yellow
        if (l.status === "Contacted") row.style.backgroundColor = "#d1ecf1";

    row.innerHTML = `
        <td>${l.name || ""}</td>
        <td>${l.phone || ""}</td>
        <td>${l.stage || ""}</td>
        <td>${l.category || ""}</td>
        <td>${l.exam || ""}</td>
        <td>
            <select onchange="updateStatus('${l.id}', this.value)">
                <option ${l.status === "New" ? "selected" : ""}>New</option>
                <option ${l.status === "Interested" ? "selected" : ""}>Interested</option>
                <option ${l.status === "Contacted" ? "selected" : ""}>Contacted</option>
                <option ${l.status === "Converted" ? "selected" : ""}>Converted</option>
                <option ${l.status === "Dropped" ? "selected" : ""}>Dropped</option>
            </select>
        </td>
    `;

    table.appendChild(row);
  });

}
document.getElementById("statusFilter").addEventListener("change", () => {
  const selected = document.getElementById("statusFilter").value;

  if (selected === "All") {
    render(ALL_LEADS);
  } else {
    const filtered = ALL_LEADS.filter(l => l.status === selected);
    render(filtered);
  }
});
async function updateStatus(id, newStatus) {
  const { error } = await supabaseClient
    .from("Leads")
    .update({ status: newStatus })
    .eq("id", id);

  if (error) {
    console.error(error);
    alert("Failed to update");
    return;
  }

  await loadLeads(); // refresh UI
}

// ================= LOGOUT =================
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
});

// ================= START =================
init();
</script>

</body>
</html>
