<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<h2>Leads Dashboard</h2>

<div style="margin: 20px 0;">
  <strong>Your Student Form Link:</strong><br>
  <input id="formLink" style="width: 400px;" readonly />
  <button onclick="copyLink()">Copy</button>
</div>

<div>
  <strong id="userInfo">Checking user...</strong>
  <button id="logoutBtn">Logout</button>
</div>

<br><br>

<input id="searchInput" placeholder="Search name or phone" />
<br><br>

<label>Filter by Status: </label>
<select id="statusFilter">
  <option value="All">All</option>
  <option value="New">New</option>
  <option value="Interested">Interested</option>
  <option value="Contacted">Contacted</option>
  <option value="Converted">Converted</option>
  <option value="Dropped">Dropped</option>
</select>

<br><br>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xsdalnxweznnjzogyqaa.supabase.co",
  "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt"
);

let ALL_LEADS = [];
let BUSINESS_ID = null;

// ================= INIT =================
async function init() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    window.location.href = "/login.html";
    return;
  }

  document.getElementById("userInfo").innerText =
    "Logged in as: " + user.email;

  const { data: biz, error: bizError } = await supabaseClient
    .from("Businesses")
    .select("id")
    .eq("user_id", user.id)
    .single();

  if (bizError || !biz) {
    alert("No business found");
    console.error(bizError);
    return;
  }

  BUSINESS_ID = biz.id;
  setFormLink();
  loadLeads();
}

// ================= LOAD LEADS =================
async function loadLeads() {
  const { data: leads, error } = await supabaseClient
    .from("Leads")
    .select("*")
    .eq("business_id", BUSINESS_ID)
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  ALL_LEADS = leads || [];
  render(ALL_LEADS);
}

// ================= RENDER =================
function render(leads) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  leads.forEach(l => {
    const row = document.createElement("tr");

    if (l.status === "Converted") row.style.backgroundColor = "#d4edda";
    if (l.status === "Dropped") row.style.backgroundColor = "#f8d7da";
    if (l.status === "Interested") row.style.backgroundColor = "#fff3cd";
    if (l.status === "Contacted") row.style.backgroundColor = "#d1ecf1";

    row.innerHTML = `
      <td>${l.name || ""}</td>
      <td>${l.phone || ""}</td>
      <td>${l.stage || ""}</td>
      <td>${l.category || ""}</td>
      <td>${l.exam || ""}</td>

      <td>
        <select onchange="updateStatus('${l.id}', this.value)">
          <option value="New" ${l.status === "New" ? "selected" : ""}>New</option>
          <option value="Interested" ${l.status === "Interested" ? "selected" : ""}>Interested</option>
          <option value="Contacted" ${l.status === "Contacted" ? "selected" : ""}>Contacted</option>
          <option value="Converted" ${l.status === "Converted" ? "selected" : ""}>Converted</option>
          <option value="Dropped" ${l.status === "Dropped" ? "selected" : ""}>Dropped</option>
        </select>

        <br><br>

        <button onclick="addNote('${l.id}')">Add Note</button>
        <button onclick="viewHistory('${l.id}')">View</button>
      </td>
    `;

    table.appendChild(row);
  });
}

// ================= APPLY FILTERS =================
function applyFilters() {
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const selectedStatus = document.getElementById("statusFilter").value;

  let filtered = ALL_LEADS;

  if (searchValue) {
    filtered = filtered.filter(l =>
      (l.name || "").toLowerCase().includes(searchValue) ||
      (l.phone || "").includes(searchValue)
    );
  }

  if (selectedStatus !== "All") {
    filtered = filtered.filter(l => l.status === selectedStatus);
  }

  render(filtered);
}

// ✅ ONLY ONE SET OF LISTENERS (FIXED)
document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("statusFilter").addEventListener("change", applyFilters);

// ================= UPDATE STATUS =================
async function updateStatus(id, newStatus) {
  const { error } = await supabaseClient
    .from("Leads")
    .update({ status: newStatus })
    .eq("id", id);

  if (error) {
    console.error(error);
    alert("Failed to update");
    return;
  }

  await supabaseClient
    .from("interactions")
    .insert([{
      lead_id: id,
      type: "status",
      message: "Status changed to " + newStatus
    }]);

  await loadLeads();
}

// ================= ADD NOTE =================
async function addNote(leadId) {
  const note = prompt("Enter note:");
  if (!note) return;

  const { error } = await supabaseClient
    .from("interactions")
    .insert([{
      lead_id: leadId,
      type: "note",
      message: note
    }]);

  if (error) {
    alert("Failed to save note");
    console.error(error);
  } else {
    alert("Note saved");
  }
}

// ================= VIEW HISTORY =================
async function viewHistory(leadId) {
  const { data, error } = await supabaseClient
    .from("interactions")
    .select("*")
    .eq("lead_id", leadId)
    .order("created_at", { ascending: false });

  if (error) {
    alert("Error loading history");
    return;
  }

  if (!data.length) {
    alert("No history found");
    return;
  }

  let text = "";
  data.forEach(i => {
    text += `[${i.type}] ${i.message || ""}\n`;
  });

  alert(text);
}

// ================= UTIL =================
function setFormLink() {
  const link = `${window.location.origin}/form.html?biz=${BUSINESS_ID}`;
  document.getElementById("formLink").value = link;
}

function copyLink() {
  const input = document.getElementById("formLink");
  input.select();
  document.execCommand("copy");
  alert("Link copied!");
}

// ================= LOGOUT =================
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
});

// ================= START =================
init();
</script>

</body>
</html>
