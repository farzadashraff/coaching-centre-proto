<!DOCTYPE html>
<html>
<head>
  <title>CRM Dashboard</title>
</head>
<body>

<!-- USER INFO -->
<div style="margin-bottom: 10px;">
  <strong id="userInfo">Checking user...</strong>
  <button onclick="logout()" style="margin-left: 10px;">Logout</button>
</div>

<h2>Leads Dashboard</h2>

<!-- ✅ NEW: FORM LINK SECTION -->
<div style="margin-bottom: 20px; padding:10px; border:1px solid #ccc;">
  <strong>Your Student Form Link:</strong><br><br>
  <input id="formLink" style="width: 80%;" readonly />
  <button onclick="copyLink()">Copy</button>
</div>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Stage</th>
      <th>Category</th>
      <th>Exam</th>
      <th>Status</th>
      <th>Duration</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://xsdalnxweznnjzogyqaa.supabase.co";
const SUPABASE_KEY = "sb_publishable_8YsECibGGtbRwxqf0HhH6w_lBUmW_nt";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function fetchData() {
  try {
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
      alert("Not logged in");
      window.location.href = "/login.html";
      return;
    }

    document.getElementById("userInfo").innerText = "Logged in as: " + user.email;

    // GET BUSINESS
    const { data: businesses, error: bizError } = await supabaseClient
      .from("Businesses")
      .select("*")
      .eq("user_id", user.id);

    if (bizError || !businesses || businesses.length === 0) {
      alert("No business linked");
      return;
    }

    const BUSINESS_ID = businesses[0].id;

    // ✅ GENERATE FORM LINK
    const link = `${window.location.origin}/form.html?biz=${BUSINESS_ID}`;
    document.getElementById("formLink").value = link;

    // GET LEADS
    const { data: leads, error: leadsError } = await supabaseClient
      .from("Leads")
      .select("*")
      .eq("business_id", BUSINESS_ID)
      .order("created_at", { ascending: false });

    // GET INTERACTIONS
    const { data: interactions, error: interError } = await supabaseClient
      .from("interactions")
      .select("*")
      .eq("business_id", BUSINESS_ID);

    if (leadsError || interError) {
      console.error("Fetch error:", leadsError, interError);
      return;
    }

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    const clean = p => (p || "").replace(/\D/g, "");

    leads.forEach(lead => {
      const interaction = interactions
        .filter(i => clean(i.phone) === clean(lead.phone))
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${lead.name || ""}</td>
        <td>${lead.phone || ""}</td>
        <td>${lead.stage || ""}</td>
        <td>${lead.category || ""}</td>
        <td>${lead.exam || ""}</td>

        <td>
          <select onchange="updateStatus('${lead.id}', this.value)">
            <option ${lead.status === 'New' ? 'selected' : ''}>New</option>
            <option ${lead.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
            <option ${lead.status === 'Interested' ? 'selected' : ''}>Interested</option>
            <option ${lead.status === 'Converted' ? 'selected' : ''}>Converted</option>
            <option ${lead.status === 'Dropped' ? 'selected' : ''}>Dropped</option>
          </select>
        </td>

        <td>${interaction ? interaction.selection : "Not Selected"}</td>
      `;

      table.appendChild(row);
    });

  } catch (err) {
    console.error("ERROR:", err);
  }
}

async function updateStatus(leadId, newStatus) {
  const { error } = await supabaseClient
    .from("Leads")
    .update({ status: newStatus })
    .eq("id", leadId);

  if (error) {
    alert("Failed to update status");
  }
}

// ✅ COPY FUNCTION
function copyLink() {
  const input = document.getElementById("formLink");
  input.select();
  document.execCommand("copy");
  alert("Link copied!");
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
}

fetchData();
</script>

</body>
</html>
